<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Page not found | LulaSync</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="./assets/logo-ls.svg" type="image/svg+xml" />
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0A0705;color:#F5EDD8;font-family:Inter,system-ui,sans-serif;padding:24px;text-align:center}
    a{color:#F0A500;font-weight:700}
    h1{font-size:clamp(1.8rem,5vw,2.6rem);margin:0 0 12px}
    p{color:rgba(245,237,216,.6);line-height:1.6}
  </style>
  <script>
    // Recover common case-study paths if someone hits /case-studies/name without file
    (function () {
      var path = location.pathname || '';
      var m = path.match(/\/case-studies\/([a-z0-9\-]+)\.html?$/i);
      if (m) {
        location.replace('../' + m[1] + '.html' + (location.search||'') + (location.hash||''));
        return;
      }
      m = path.match(/\/case-studies\/([a-z0-9\-]+)\/?$/i);
      if (m) {
        location.replace('../' + m[1] + '.html' + (location.search||'') + (location.hash||''));
      }
    })();
  </script>
</head>
<body>
  <div>
    <h1>Page not found</h1>
    <p>That URL isn’t available. Try the showcase or home page.</p>
    <p><a href="./showcase.html#portfolio">Case studies</a> · <a href="./index.html">Home</a> · <a href="./contact.html">Contact</a></p>
  </div>
</body>
</html>

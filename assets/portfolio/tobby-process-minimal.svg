<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-labelledby="t3">
  <title id="t3">Ask-IT chatbot process: intents, flows, hand-off</title>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff6f6"/>
      <stop offset="100%" stop-color="#f2f4f8"/>
    </linearGradient>
  </defs>
  <rect width="900" height="320" fill="url(#bg2)"/>
  <rect x="0" y="0" width="900" height="6" fill="#e60000"/>
  <text x="450" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" letter-spacing="0.08em" fill="#191b1d">ASK-IT (TOBBY) - PROCESS SCHEMATIC</text>
  <text x="450" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#60656f">No chat UI - logical sequence only</text>
  <g font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#191b1d">
    <rect x="40" y="100" width="150" height="104" rx="8" fill="#fff" stroke="#f0c9c9"/>
    <text x="115" y="128" text-anchor="middle" font-weight="700" fill="#e60000">A</text>
    <text x="115" y="148" text-anchor="middle">Intent set</text>
    <text x="115" y="166" text-anchor="middle" font-size="9" fill="#555">from IT ticket data</text>
    <path d="M 195 152 L 235 152" stroke="#e60000" stroke-width="2"/>
    <polygon points="235,152 225,147 225,157" fill="#e60000"/>
    <rect x="245" y="100" width="150" height="104" rx="8" fill="#fff" stroke="#f0c9c9"/>
    <text x="320" y="128" text-anchor="middle" font-weight="700" fill="#e60000">B</text>
    <text x="320" y="148" text-anchor="middle">Flow maps</text>
    <text x="320" y="166" text-anchor="middle" font-size="9" fill="#555">happy path + edge</text>
    <path d="M 400 152 L 440 152" stroke="#e60000" stroke-width="2"/>
    <polygon points="440,152 430,147 430,157" fill="#e60000"/>
    <rect x="450" y="100" width="150" height="104" rx="8" fill="#fff" stroke="#f0c9c9"/>
    <text x="525" y="128" text-anchor="middle" font-weight="700" fill="#e60000">C</text>
    <text x="525" y="148" text-anchor="middle">Tone and copy</text>
    <text x="525" y="166" text-anchor="middle" font-size="9" fill="#555">constraints</text>
    <path d="M 605 152 L 645 152" stroke="#e60000" stroke-width="2"/>
    <polygon points="645,152 635,147 635,157" fill="#e60000"/>
    <rect x="655" y="100" width="200" height="104" rx="8" fill="#fff" stroke="#e60000" stroke-width="2"/>
    <text x="755" y="128" text-anchor="middle" font-weight="700" fill="#e60000">D</text>
    <text x="755" y="148" text-anchor="middle">Hand-off</text>
    <text x="755" y="166" text-anchor="middle" font-size="9" fill="#555">ticket -> human</text>
  </g>
  <circle cx="72" cy="264" r="8" fill="#e60000" opacity="0.2"/>
  <text x="450" y="275" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6c7078">Vodacom-themed color accents, process view only.</text>
</svg>

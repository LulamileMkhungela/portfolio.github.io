  <text x="185" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fff">ADOBE XD</text>
  <rect x="102" y="186" width="34" height="22" rx="4" fill="#ffe8e8"/>
  <text x="100" y="224" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#191b1d">- Layouts and specs</text>
  <text x="100" y="246" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#191b1d">- Component structure</text>
  <text x="100" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#191b1d">- Redlines for hand-off</text>
  <rect x="450" y="130" width="210" height="170" rx="10" fill="#ffffff" stroke="#f0c9c9"/>
  <rect x="450" y="130" width="210" height="40" rx="10" fill="#e60000"/>
  <text x="555" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fff">INVISION DSM</text>
  <circle cx="474" cy="198" r="10" fill="#ffe8e8"/>
  <text x="470" y="224" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#191b1d">- Tokens (colour, type)</text>
  <text x="470" y="246" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#191b1d">- Component library</text>
  <text x="470" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#191b1d">- Usage and governance</text>
  <rect x="820" y="130" width="300" height="170" rx="10" fill="#ffffff" stroke="#f0c9c9"/>

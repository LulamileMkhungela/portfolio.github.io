<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="t1">
  <title id="t1">Design toolkit chain: Adobe XD, InVision DSM, Storybook</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="100%" stop-color="#f3f4f8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="8" fill="#e60000"/>
  <circle cx="1075" cy="60" r="36" fill="#e60000" opacity="0.12"/>
  <text x="600" y="46" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" letter-spacing="0.08em" fill="#191b1d">VODACOM - SYSTEM DELIVERY (TOOLCHAIN)</text>
  <text x="600" y="74" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#585c66">Adobe XD -> InVision DSM -> Storybook</text>

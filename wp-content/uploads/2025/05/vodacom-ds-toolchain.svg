  <rect x="840" y="186" width="28" height="20" rx="3" fill="#ffe8e8"/>
  <text x="840" y="224" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#191b1d">- Live UI states for dev and QA</text>
  <text x="840" y="246" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#191b1d">- Docs next to implementations</text>
  <text x="840" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#191b1d">- Single reference in code</text>
  <text x="600" y="372" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6c7078">Vodacom-inspired red accents for case-study communication only.</text>

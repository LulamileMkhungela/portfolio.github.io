<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="t2">
  <title id="t2">Vodacom External Bursary - application process with Tobby helper</title>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff6f6"/>
      <stop offset="100%" stop-color="#f4f5fa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" fill="url(#bg3)"/>
  <rect x="0" y="0" width="1200" height="8" fill="#e60000"/>
  <text x="600" y="40" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" letter-spacing="0.08em" fill="#191b1d">VODACOM EXTERNAL BURSARY - END-TO-END FLOW</text>
  <text x="600" y="64" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5f646e">High-level service design - web, comms, and assistant (not a UI mock-up)</text>
  <g font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#191b1d">
    <rect x="48" y="120" width="160" height="60" rx="8" fill="#fff" stroke="#e60000" stroke-width="2"/>
    <text x="128" y="144" text-anchor="middle" font-weight="700" fill="#e60000">1 - DISCOVER</text>
    <text x="128" y="164" text-anchor="middle" font-size="10" fill="#5f646e">Site and career comms</text>
    <path d="M 218 150 L 248 150" stroke="#e60000" stroke-width="2"/>
    <polygon points="248,150 238,145 238,155" fill="#e60000"/>
    <rect x="260" y="120" width="160" height="60" rx="8" fill="#fff" stroke="#e60000" stroke-width="2"/>
    <text x="340" y="144" text-anchor="middle" font-weight="700" fill="#e60000">2 - ELIGIBILITY</text>
    <text x="340" y="164" text-anchor="middle" font-size="10" fill="#5f646e">Rules and checklist</text>
    <path d="M 430 150 L 460 150" stroke="#e60000" stroke-width="2"/>
    <polygon points="460,150 450,145 450,155" fill="#e60000"/>
    <rect x="472" y="116" width="180" height="68" rx="8" fill="#fff" stroke="#e60000" stroke-width="3"/>
    <text x="562" y="142" text-anchor="middle" font-weight="700" fill="#e60000">3 - TOBBY (ENTRY)</text>
    <text x="562" y="164" text-anchor="middle" font-size="10" fill="#5f646e">FAQs - docs - routing</text>
    <path d="M 662 150 L 692 150" stroke="#e60000" stroke-width="2"/>
    <polygon points="692,150 682,145 682,155" fill="#e60000"/>
    <rect x="704" y="120" width="160" height="60" rx="8" fill="#fff" stroke="#e60000" stroke-width="2"/>
    <text x="784" y="144" text-anchor="middle" font-weight="700" fill="#e60000">4 - APPLY</text>
    <text x="784" y="164" text-anchor="middle" font-size="10" fill="#5f646e">Form and uploads</text>
    <path d="M 874 150 L 904 150" stroke="#e60000" stroke-width="2"/>
    <polygon points="904,150 894,145 894,155" fill="#e60000"/>
    <rect x="916" y="120" width="236" height="60" rx="8" fill="#fff" stroke="#e60000" stroke-width="2"/>
    <text x="1034" y="144" text-anchor="middle" font-weight="700" fill="#e60000">5 - STATUS</text>
    <text x="1034" y="164" text-anchor="middle" font-size="10" fill="#5f646e">Email, assistant, portal</text>
  </g>
  <rect x="48" y="218" width="1104" height="204" rx="10" fill="#fff" stroke="#f0c9c9"/>
  <circle cx="80" cy="250" r="8" fill="#e60000"/>
  <text x="102" y="254" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#191b1d">Where chatbot support sits</text>
  <text x="72" y="282" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555b66">Tobby supports steps 2-5: eligibility questions, document lists, hand-off into application, and status wording.</text>
  <text x="72" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555b66">No conversational UI shown here - this is the operational sequence only.</text>
  <rect x="72" y="334" width="260" height="56" rx="8" fill="#fff5f5" stroke="#f0c9c9"/>
  <text x="90" y="356" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e60000" font-weight="700">Applicant illustration</text>
  <text x="90" y="374" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5f646e">Documents ready -> guided submit</text>
  <text x="600" y="454" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6c7078">Vodacom-inspired color accents for storytelling only.</text>
</svg>
